<script>
(function () {
  'use strict';

  var els = {
    targetFolderId:  document.getElementById('targetFolderId'),
    advancedLoad:    document.getElementById('advanced-load'),
    newOwnerEmail:   document.getElementById('newOwnerEmail'),
    loadBtn:         document.getElementById('loadBtn'),
    loadMyDriveBtn:  document.getElementById('loadMyDriveBtn'),
    previewBtn:      document.getElementById('previewBtn'),
    commitBtn:       document.getElementById('commitBtn'),
    queueBody:       document.getElementById('queue-body'),
    refreshQueueBtn: document.getElementById('refreshQueueBtn'),
    status:          document.getElementById('status'),
    treeCard:        document.getElementById('tree-card'),
    tree:            document.getElementById('tree'),
    counters:        document.getElementById('counters'),
    selectAllToggle: document.getElementById('selectAllToggle'),
    previewContainer:document.getElementById('preview-container'),
    modalBackdrop:   document.getElementById('modalBackdrop'),
    modalTitle:      document.getElementById('modalTitle'),
    modalBody:       document.getElementById('modalBody'),
    modalCancelBtn:  document.getElementById('modalCancelBtn'),
    modalConfirmBtn: document.getElementById('modalConfirmBtn')
  };

  // -------------------------------------------------------------------------
  // State
  //
  // nodes:     id → node metadata (id, name, isFolder, owner, transferable,
  //                                parentId, childrenLoaded, expanded)
  // childrenById: id → array of child ids in render order
  // recursive: set of folder ids the user chose "transfer everything inside"
  // explicit:  set of individually-selected item ids (not covered by a recursive ancestor)
  //
  // Effective checked = id ∈ recursive || id ∈ explicit || any ancestor in recursive.
  // Locked            = !transferable  || any ancestor in recursive.
  //
  // The server sees only `recursive` and `explicit`. It walks each recursive
  // subtree with DriveApp and produces the actual plan — the client never
  // needs to have expanded a folder for it to be transferred.
  // -------------------------------------------------------------------------
  var state = {
    activeUserEmail: '',
    rootId: null,
    nodes: Object.create(null),
    childrenById: Object.create(null),
    recursive: Object.create(null),
    explicit:  Object.create(null)
  };

  els.loadBtn.addEventListener('click', onLoad);
  els.loadMyDriveBtn.addEventListener('click', onLoadMyDrive);
  els.previewBtn.addEventListener('click', onPreview);
  els.commitBtn.addEventListener('click', onCommit);
  els.selectAllToggle.addEventListener('change', function () {
    if (els.selectAllToggle.checked) {
      onSelectAllInView();
    } else {
      onClearAll();
    }
  });
  els.refreshQueueBtn.addEventListener('click', function () { fetchQueue(true); });

  // ---- Queue poll ---------------------------------------------------------
  // Fetch on page load; then poll every 8s while any job is present. When
  // the registry goes empty, stop polling to avoid burning ScriptProperties
  // quota. Immediate refresh on tab-return so a user coming back after
  // background throttling never stares at stale data.
  var queuePollTimer = null;
  var lastQueueEmail = null;
  // Client-side auto-nudge state. If the queue's oldest running job hasn't
  // reported progress in AUTO_NUDGE_STALE_MS, fire nudgeResume() from the
  // browser. This works around Apps Script's time-based-trigger scheduler
  // being unreliable — even at after(60000) we've seen triggers dropped
  // silently. As long as any allowlisted user has this tab open, running
  // jobs get an immediate resume kick without waiting for a trigger.
  var lastAutoNudgeAt = 0;
  var AUTO_NUDGE_STALE_MS   = 90 * 1000;   // consider a job stalled after 90s of no update
  var AUTO_NUDGE_COOLDOWN   = 60 * 1000;   // don't fire another nudge within 60s of the last
  var modalState = null;
  var lastFocusedEl = null;

  els.modalCancelBtn.addEventListener('click', function () { closeModalDialog(false); });
  els.modalConfirmBtn.addEventListener('click', function () { closeModalDialog(true); });
  els.modalBackdrop.addEventListener('click', function (evt) {
    if (evt.target !== els.modalBackdrop || !modalState) return;
    closeModalDialog(modalState.mode === 'alert');
  });
  document.addEventListener('keydown', function (evt) {
    if (evt.key !== 'Escape' || !modalState) return;
    evt.preventDefault();
    closeModalDialog(modalState.mode === 'alert');
  });

  function scheduleQueuePoll() {
    if (queuePollTimer) return;
    queuePollTimer = setInterval(function () {
      if (document.visibilityState !== 'visible') return; // respect Chrome throttling
      fetchQueue(false);
    }, 8000);
  }
  function stopQueuePoll() {
    if (queuePollTimer) { clearInterval(queuePollTimer); queuePollTimer = null; }
  }

  function fetchQueue(showLoadingState) {
    if (showLoadingState) els.refreshQueueBtn.disabled = true;
    google.script.run
      .withSuccessHandler(function (payload) {
        renderQueue(payload && payload.jobs ? payload.jobs : []);
        els.refreshQueueBtn.disabled = false;
      })
      .withFailureHandler(function (err) {
        els.refreshQueueBtn.disabled = false;
        // Do not display in the top status line — the queue is peripheral.
        // A stale-but-present table is fine; a failed poll is silent.
        if (window.console) console.warn('listJobs failed:', errMsg(err));
      })
      .listJobs();
  }

  function renderQueue(jobs) {
    els.queueBody.innerHTML = '';
    if (!jobs || jobs.length === 0) {
      var empty = document.createElement('p');
      empty.className = 'pt-queue-empty';
      empty.textContent = 'No transfers running.';
      els.queueBody.appendChild(empty);
      stopQueuePoll();
      return;
    }
    var me = lastQueueEmail || (state && state.activeUserEmail) || '';
    var list = document.createElement('div');
    list.className = 'pt-queue-list';
    for (var i = 0; i < jobs.length; i++) {
      list.appendChild(renderQueueCard(jobs[i], me));
    }
    els.queueBody.appendChild(list);
    scheduleQueuePoll();
    maybeAutoNudge(jobs);
  }

  function maybeAutoNudge(jobs) {
    if (!jobs || jobs.length === 0) return;
    var now = Date.now();
    if (now - lastAutoNudgeAt < AUTO_NUDGE_COOLDOWN) return;

    var stalled = null;
    for (var i = 0; i < jobs.length; i++) {
      var j = jobs[i];
      if (j.status !== 'running') continue;
      var lastAt = j.checkpointedAt || j.startedAt;
      if (!lastAt) continue;
      var age = now - new Date(lastAt).getTime();
      if (age > AUTO_NUDGE_STALE_MS) { stalled = j; break; }
    }
    if (!stalled) return;

    console.warn('gmove: auto-nudging stalled job ' + stalled.jobId +
                 ' (' + stalled.processed + '/' + stalled.total +
                 ', last activity ' + (stalled.checkpointedAt || stalled.startedAt) + ')');
    lastAutoNudgeAt = now;
    google.script.run
      .withSuccessHandler(function (r) {
        console.info('gmove: auto-nudge result:', JSON.stringify(r));
        fetchQueue(false);
      })
      .withFailureHandler(function (e) {
        console.warn('gmove: auto-nudge failed:', e && e.message ? e.message : e);
      })
      .nudgeResume();
  }

  function renderQueueCard(job, me) {
    var card = document.createElement('article');
    card.className = 'pt-queue-card';
    if (job.initiator && me && String(job.initiator).toLowerCase() === String(me).toLowerCase()) {
      card.classList.add('pt-queue-card--mine');
    }
    if (job.status === 'running') {
      var lastAt = job.checkpointedAt || job.startedAt;
      if (lastAt && (Date.now() - new Date(lastAt).getTime()) > AUTO_NUDGE_STALE_MS) {
        card.classList.add('pt-queue-card--stalled');
      }
    }

    var header = document.createElement('div');
    header.className = 'pt-queue-card__header';
    var title = document.createElement('div');
    title.className = 'pt-queue-card__title';
    title.textContent = job.newOwnerEmail || 'Transfer';
    header.appendChild(title);
    header.appendChild(statusPill(job.status));
    card.appendChild(header);

    var meta = document.createElement('dl');
    meta.className = 'pt-queue-card__meta';
    appendQueueMeta(meta, 'Initiator', job.initiator || '—');
    appendQueueMeta(meta, 'Folder ID', (job.targetFolderId || '').slice(-8) || '—', job.targetFolderId || '');
    appendQueueMeta(meta, 'Started', shortTime(job.startedAt));
    card.appendChild(meta);

    var progress = document.createElement('div');
    progress.className = 'pt-queue-card__progress';
    progress.appendChild(progressBar(job.processed || 0, job.total || 0));
    card.appendChild(progress);

    card.appendChild(actionsBlock(job));

    if (job.lastError) {
      var errorBox = document.createElement('div');
      errorBox.className = 'pt-queue-card__error';
      var errAt = job.lastErrorAt ? ' at ' + shortTime(job.lastErrorAt) : '';
      errorBox.innerHTML = '<strong>Last error' + errAt + ':</strong> ';
      errorBox.appendChild(document.createTextNode(job.lastError));
      card.appendChild(errorBox);
    }
    return card;
  }

  function actionsBlock(job) {
    var wrap = document.createElement('div');
    wrap.className = 'pt-queue-card__actions';
    var canNudge = (job.status === 'running' || job.status === 'report_pending');
    var nudgeBtn = document.createElement('button');
    nudgeBtn.type = 'button';
    nudgeBtn.className = 'pt-btn pt-btn--outline pt-btn--small';
    nudgeBtn.textContent = 'Nudge';
    nudgeBtn.title = canNudge
      ? 'Force runBatch_ NOW rather than wait for the resume trigger or 90s auto-nudge.'
      : 'Only running or report_pending jobs can be nudged directly.';
    nudgeBtn.disabled = !canNudge;
    nudgeBtn.addEventListener('click', function () { nudgeJob(job, nudgeBtn); });

    var cancelBtn = document.createElement('button');
    cancelBtn.type = 'button';
    cancelBtn.className = 'pt-btn pt-btn--outline pt-btn--small';
    cancelBtn.textContent = 'Cancel';
    cancelBtn.title = 'Drop this job from the queue. Items already transferred stay transferred.';
    cancelBtn.addEventListener('click', function () { cancelJob(job, cancelBtn); });

    wrap.appendChild(nudgeBtn);
    wrap.appendChild(cancelBtn);
    return wrap;
  }

  function nudgeJob(job, btn) {
    btn.disabled = true;
    var originalLabel = btn.textContent;
    btn.textContent = 'Nudging…';
    setStatus('Nudging job ' + (job.jobId || '').slice(0, 8) + '…');
    // Reset the client-side auto-nudge cooldown so a follow-on auto poll
    // will re-fire if this nudge doesn't fully drain the job.
    lastAutoNudgeAt = 0;
    google.script.run
      .withSuccessHandler(function (result) {
        btn.textContent = originalLabel;
        btn.disabled = false;
        var tail;
        if (result && result.done) {
          tail = ' → completed. Processed ' + result.processed + '/' + result.total + '.';
        } else if (result && typeof result.processed === 'number') {
          tail = ' → advanced to ' + result.processed + '/' + result.total + ' (still running).';
        } else if (result && result.message) {
          tail = ' → ' + result.message;
        } else {
          tail = ' → ' + JSON.stringify(result);
        }
        setStatus('Nudge returned' + tail, 'ok');
        fetchQueue(true);
      })
      .withFailureHandler(function (err) {
        btn.textContent = originalLabel;
        btn.disabled = false;
        setStatus('Nudge failed: ' + errMsg(err), 'error');
        showAlertDialog('Could not nudge transfer', errMsg(err));
        // Even on failure, refresh — the server may have written a lastError
        // to the meta which we want visible.
        fetchQueue(true);
      })
      .nudgeResume();
  }

  function cancelJob(job, btn) {
    var done = job.processed || 0;
    var total = job.total || 0;
    showConfirmDialog({
      title: 'Cancel transfer?',
      bodyHtml:
        '<p><strong>Initiator:</strong> ' + escapeHtmlText(job.initiator || '—') + '</p>' +
        '<p><strong>New owner:</strong> ' + escapeHtmlText(job.newOwnerEmail || '—') + '</p>' +
        '<p><strong>Status:</strong> ' + escapeHtmlText(job.status || '—') + '</p>' +
        '<p><strong>Progress at cancel:</strong> ' + done + '/' + total + '</p>' +
        '<p>The ' + done + ' item(s) already transferred will remain transferred. The remaining ' +
        Math.max(0, total - done) + ' will not be attempted.</p>',
      confirmLabel: 'Cancel transfer'
    }, function (confirmed) {
      if (!confirmed) return;
      btn.disabled = true;
      btn.textContent = 'Cancelling…';
      google.script.run
        .withSuccessHandler(function (result) {
          btn.textContent = 'Cancel';
          btn.disabled = false;
          if (result && result.cancelled) {
            setStatus('Cancelled job ' + (result.jobId || '').slice(0, 8) + ' — ' +
                      result.processed + '/' + result.total + ' had already transferred.', 'ok');
          } else {
            var reason = result && result.reason ? result.reason : 'unknown';
            setStatus('Cancel failed: ' + reason, 'error');
            showAlertDialog('Could not cancel transfer', reason);
          }
          fetchQueue(true);
        })
        .withFailureHandler(function (err) {
          btn.textContent = 'Cancel';
          btn.disabled = false;
          setStatus('Cancel error: ' + errMsg(err), 'error');
          showAlertDialog('Could not cancel transfer', errMsg(err));
        })
        .cancelJob(job.jobId);
    });
  }

  function appendQueueMeta(dl, label, value, title) {
    var dt = document.createElement('dt');
    dt.textContent = label;
    var dd = document.createElement('dd');
    dd.textContent = value == null ? '' : String(value);
    if (title) dd.title = title;
    dl.appendChild(dt);
    dl.appendChild(dd);
  }
  function progressBar(done, total) {
    var wrap = document.createElement('div');
    var pct = total > 0 ? Math.min(100, Math.round(100 * done / total)) : 0;
    var bar = document.createElement('span');
    bar.className = 'pt-progress-bar';
    var fill = document.createElement('span');
    fill.className = 'pt-progress-bar__fill';
    fill.style.width = pct + '%';
    bar.appendChild(fill);
    var text = document.createElement('span');
    text.className = 'pt-progress-text';
    text.textContent = done + '/' + total;
    wrap.appendChild(bar);
    wrap.appendChild(text);
    return wrap;
  }
  function statusPill(status) {
    var pill = document.createElement('span');
    var kind = status === 'running' ? 'running'
             : status === 'queued'  ? 'queued'
             : status === 'report_pending' ? 'report-pending'
             : 'off';
    pill.className = 'pt-pill pt-pill--' + kind;
    pill.textContent = status || '—';
    return pill;
  }
  function shortTime(iso) {
    if (!iso) return '—';
    var d = new Date(iso);
    if (isNaN(d.getTime())) return iso;
    // "HH:MM" in the user's local time
    var pad = function (n) { return n < 10 ? '0' + n : String(n); };
    return pad(d.getHours()) + ':' + pad(d.getMinutes());
  }

  document.addEventListener('visibilitychange', function () {
    if (document.visibilityState === 'visible') fetchQueue(false);
  });

  // Kick off the initial fetch. The doGet template already exposes the
  // active user's email on the "Signed in as" line — reuse that so we can
  // highlight the caller's rows without an extra RPC.
  var signedInCode = document.querySelector('.pt-signed-in code');
  if (signedInCode) lastQueueEmail = signedInCode.textContent.trim();
  fetchQueue(true);

  // ---- Status helpers -----------------------------------------------------
  function setStatus(msg, kind) {
    els.status.innerHTML = msg || '';
    els.status.className = 'pt-status' + (kind ? ' pt-status--' + kind : '');
  }

  function setMyDriveLoading(isLoading) {
    var spinner = els.loadMyDriveBtn.querySelector('.pt-btn-spinner');
    if (spinner) {
      spinner.hidden = !isLoading;
    }
  }

  function escapeHtmlText(value) {
    return String(value == null ? '' : value)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function showModalDialog(opts) {
    modalState = {
      mode: opts.mode || 'confirm',
      onClose: opts.onClose || function () {}
    };
    lastFocusedEl = document.activeElement;
    els.modalTitle.textContent = opts.title || '';
    els.modalBody.innerHTML = opts.bodyHtml || '';
    els.modalConfirmBtn.textContent = opts.confirmLabel || 'Continue';
    els.modalCancelBtn.textContent = opts.cancelLabel || 'Cancel';
    els.modalCancelBtn.hidden = modalState.mode === 'alert';
    els.modalBackdrop.hidden = false;
    document.body.classList.add('pt-modal-open');
    setTimeout(function () {
      (modalState.mode === 'alert' ? els.modalConfirmBtn : els.modalCancelBtn).focus();
    }, 0);
  }

  function closeModalDialog(confirmed) {
    if (!modalState) return;
    var onClose = modalState.onClose;
    modalState = null;
    els.modalBackdrop.hidden = true;
    document.body.classList.remove('pt-modal-open');
    if (lastFocusedEl && lastFocusedEl.focus) lastFocusedEl.focus();
    onClose(confirmed);
  }

  function showConfirmDialog(opts, callback) {
    showModalDialog({
      mode: 'confirm',
      title: opts.title,
      bodyHtml: opts.bodyHtml,
      confirmLabel: opts.confirmLabel || 'Continue',
      cancelLabel: opts.cancelLabel || 'Cancel',
      onClose: callback
    });
  }

  function showAlertDialog(title, message, callback) {
    showModalDialog({
      mode: 'alert',
      title: title,
      bodyHtml: '<p>' + escapeHtmlText(message) + '</p>',
      confirmLabel: 'OK',
      onClose: callback || function () {}
    });
  }

  // ---- Root load ----------------------------------------------------------
  function extractFolderId(input) {
    if (!input) return null;
    var trimmed = input.trim();
    
    var matchFolders = trimmed.match(/\/folders\/([a-zA-Z0-9_\-]+)/);
    if (matchFolders) return matchFolders[1];
    
    var matchParam = trimmed.match(/[?&]id=([a-zA-Z0-9_\-]+)/);
    if (matchParam) return matchParam[1];
    
    if (/^https?:\/\//i.test(trimmed)) {
      return null;
    }
    
    if (/^[a-zA-Z0-9_\-]+$/.test(trimmed)) {
      return trimmed;
    }
    
    return null;
  }

  function onLoad() {
    var rawInput = (els.targetFolderId.value || '').trim();
    if (!rawInput) {
      setStatus('Enter a folder link or ID first.', 'error');
      return;
    }
    var id = extractFolderId(rawInput);
    if (!id) {
      setStatus('Invalid Google Folder link or folder ID. Please paste a valid link.', 'error');
      showAlertDialog('Invalid link', 'Please enter a valid Google Drive folder link or folder ID.');
      return;
    }
    loadRoot(id);
  }

  function onLoadMyDrive() {
    setMyDriveLoading(true);
    els.loadMyDriveBtn.disabled = true;
    setStatus('Fetching My Drive root…');
    google.script.run
      .withSuccessHandler(function (root) {
        // Populate the input so the user learns what the root ID looks like
        // and can copy it if they want to bookmark or share it.
        els.targetFolderId.value = root.id;
        els.advancedLoad.open = false;
        loadRoot(root.id);
      })
      .withFailureHandler(function (err) {
        setMyDriveLoading(false);
        els.loadMyDriveBtn.disabled = false;
        setStatus('Could not open My Drive: ' + errMsg(err), 'error');
      })
      .getMyDriveRoot();
  }

  function loadRoot(id) {
    els.loadBtn.disabled = true;
    els.loadMyDriveBtn.disabled = true;
    setStatus('Loading folder…');
    google.script.run
      .withSuccessHandler(function (result) {
        onBrowseSuccess(result, /*isRoot*/true);
        els.loadBtn.disabled = false;
        setMyDriveLoading(false);
        els.loadMyDriveBtn.disabled = false;
        els.commitBtn.disabled = false;
        setStatus('Loaded ' + result.node.name + '. Click ▸ to expand a folder. Active user: ' + result.activeUserEmail, 'ok');
      })
      .withFailureHandler(function (err) {
        els.loadBtn.disabled = false;
        setMyDriveLoading(false);
        els.loadMyDriveBtn.disabled = false;
        setStatus('Load failed: ' + errMsg(err), 'error');
      })
      .browseFolder(id);
  }

  function onBrowseSuccess(result, isRoot) {
    state.activeUserEmail = result.activeUserEmail;
    var node = result.node;
    if (isRoot) {
      state.rootId = node.id;
      state.nodes = Object.create(null);
      state.childrenById = Object.create(null);
      state.recursive = Object.create(null);
      state.explicit = Object.create(null);
      els.tree.innerHTML = '';
    }
    registerNode(node, null);
    var childIds = [];
    for (var i = 0; i < result.children.length; i++) {
      var c = result.children[i];
      registerNode(c, node.id);
      childIds.push(c.id);
    }
    state.childrenById[node.id] = childIds;
    state.nodes[node.id].childrenLoaded = true;
    state.nodes[node.id].truncated = !!result.truncated;
    state.nodes[node.id].expanded = true;

    if (isRoot) {
      var ul = document.createElement('ul');
      ul.appendChild(buildLi(node.id));
      els.tree.appendChild(ul);
      els.treeCard.hidden = false;
    } else {
      // Insert children under the existing li for `node`.
      var li = liById(node.id);
      if (!li) return;
      var childUl = li.querySelector(':scope > ul');
      if (!childUl) {
        childUl = document.createElement('ul');
        li.appendChild(childUl);
      }
      childUl.innerHTML = '';
      for (var j = 0; j < childIds.length; j++) {
        childUl.appendChild(buildLi(childIds[j]));
      }
      if (result.truncated) {
        var warn = document.createElement('li');
        warn.className = 'pt-node pt-node--skip';
        warn.innerHTML = '<span class="pt-badge">Truncated at ' + result.cap +
          ' children — narrower selection recommended for this folder.</span>';
        childUl.appendChild(warn);
      }
      updateToggleGlyph(li);
    }
    refreshAllVisibleState();
    updateCounters();
  }

  function registerNode(n, parentId) {
    if (!state.nodes[n.id]) state.nodes[n.id] = { id: n.id };
    var slot = state.nodes[n.id];
    slot.id = n.id;
    slot.name = n.name;
    slot.isFolder = !!n.isFolder;
    slot.owner = n.owner || '';
    slot.transferable = !!n.transferable;
    slot.parentId = parentId != null ? parentId : slot.parentId || null;
    slot.mimeType = n.mimeType || '';
    if (slot.childrenLoaded === undefined) slot.childrenLoaded = false;
    if (slot.expanded === undefined) slot.expanded = false;
  }

  // ---- DOM builders -------------------------------------------------------
  function buildLi(nodeId) {
    var n = state.nodes[nodeId];
    var li = document.createElement('li');
    li.dataset.id = nodeId;

    var row = document.createElement('div');
    row.className = 'pt-node';
    row.dataset.id = nodeId;

    var toggle = document.createElement('span');
    toggle.className = 'pt-node__toggle' + (n.isFolder ? '' : ' pt-node__toggle--leaf');
    toggle.textContent = n.isFolder ? '▸' : '';
    if (n.isFolder) {
      toggle.addEventListener('click', function () { onToggleFolder(nodeId); });
    }

    var checkbox = document.createElement('input');
    checkbox.type = 'checkbox';
    checkbox.dataset.id = nodeId;
    checkbox.addEventListener('change', function () { onCheckboxChange(nodeId, checkbox.checked); });

    var icon = document.createElement('span');
    icon.className = 'pt-node__icon';
    icon.textContent = n.isFolder ? '📁' : '📄';

    var label = document.createElement('span');
    label.className = 'pt-node__label' + (n.isFolder ? ' pt-node__label--folder' : '');
    label.textContent = n.name;

    var idSpan = document.createElement('span');
    idSpan.className = 'pt-node__id';
    idSpan.textContent = (n.id || '').slice(0, 10) + '…';
    idSpan.title = n.id;

    row.appendChild(toggle);
    row.appendChild(checkbox);
    row.appendChild(icon);
    row.appendChild(label);
    row.appendChild(idSpan);

    if (!n.transferable) {
      var badge = document.createElement('span');
      badge.className = 'pt-badge';
      badge.textContent = n.owner
        ? 'Owned by ' + n.owner + ' — will skip'
        : 'No single owner (shared drive?) — will skip';
      row.appendChild(badge);
    }
    li.appendChild(row);

    // Children container (populated when the folder is expanded).
    if (n.isFolder && state.childrenById[nodeId]) {
      var ul = document.createElement('ul');
      var ids = state.childrenById[nodeId];
      for (var i = 0; i < ids.length; i++) ul.appendChild(buildLi(ids[i]));
      li.appendChild(ul);
      if (!n.expanded) ul.style.display = 'none';
    }
    return li;
  }

  function liById(id) {
    return els.tree.querySelector('li[data-id="' + cssEsc(id) + '"]');
  }
  function cssEsc(s) {
    // For our purposes drive ids are alnum + - + _; safe enough to inject.
    return String(s).replace(/[^a-zA-Z0-9_\-]/g, '');
  }

  function updateToggleGlyph(li) {
    var n = state.nodes[li.dataset.id];
    var toggle = li.querySelector(':scope > .pt-node > .pt-node__toggle');
    var ul = li.querySelector(':scope > ul');
    if (!toggle) return;
    if (!n.isFolder) { toggle.textContent = ''; return; }
    if (!n.childrenLoaded) { toggle.textContent = '▸'; return; }
    var open = ul && ul.style.display !== 'none';
    toggle.textContent = open ? '▾' : '▸';
  }

  // ---- Expand / collapse --------------------------------------------------
  function onToggleFolder(id) {
    var n = state.nodes[id];
    if (!n || !n.isFolder) return;
    if (n.loading) return; // ignore rapid re-clicks while a fetch is in flight
    if (!n.childrenLoaded) {
      setToggleLoading(id, true);
      setStatus('Loading ' + n.name + '…');
      google.script.run
        .withSuccessHandler(function (result) {
          setToggleLoading(id, false);
          onBrowseSuccess(result, /*isRoot*/false);
          setStatus('', 'ok');
        })
        .withFailureHandler(function (err) {
          setToggleLoading(id, false);
          setStatus('Cannot list ' + n.name + ': ' + errMsg(err), 'error');
        })
        .browseFolder(id);
      return;
    }
    // Toggle visible state
    var li = liById(id);
    if (!li) return;
    var ul = li.querySelector(':scope > ul');
    if (!ul) return;
    n.expanded = ul.style.display === 'none';
    ul.style.display = n.expanded ? '' : 'none';
    updateToggleGlyph(li);
  }

  function setToggleLoading(id, isLoading) {
    var n = state.nodes[id];
    if (!n) return;
    n.loading = !!isLoading;
    var li = liById(id);
    if (!li) return;
    var toggle = li.querySelector(':scope > .pt-node > .pt-node__toggle');
    if (!toggle) return;
    if (isLoading) {
      toggle.classList.add('pt-node__toggle--loading');
      toggle.textContent = '';
      toggle.setAttribute('aria-label', 'Loading contents');
    } else {
      toggle.classList.remove('pt-node__toggle--loading');
      toggle.removeAttribute('aria-label');
      updateToggleGlyph(li);
    }
  }

  // ---- Ancestor / lock helpers -------------------------------------------
  function hasRecursiveAncestor(id) {
    var cur = state.nodes[id];
    while (cur && cur.parentId != null) {
      if (state.recursive[cur.parentId]) return true;
      cur = state.nodes[cur.parentId];
    }
    return false;
  }

  function isEffectivelyChecked(id) {
    if (state.recursive[id]) return true;
    if (state.explicit[id])  return true;
    return hasRecursiveAncestor(id);
  }

  function isLocked(id) {
    var n = state.nodes[id];
    if (!n || !n.transferable) return true;
    return hasRecursiveAncestor(id);
  }

  // ---- Checkbox interaction ----------------------------------------------
  function onCheckboxChange(id, checkedNow) {
    var n = state.nodes[id];
    if (!n || !n.transferable) return;
    if (hasRecursiveAncestor(id)) {
      // Locked — should not be reachable because the input is disabled, but
      // if it somehow was, restore the checkbox state and bail.
      refreshAllVisibleState();
      return;
    }
    if (checkedNow) {
      if (n.isFolder) {
        state.recursive[id] = true;
        // Any explicit descendant selections are now redundant — clear them.
        // (Not strictly required for correctness because the server-walk on
        // commit dedupes by id, but keeping client state clean is cheap.)
        clearExplicitBelow(id);
      } else {
        state.explicit[id] = true;
      }
    } else {
      delete state.recursive[id];
      delete state.explicit[id];
    }
    refreshAllVisibleState();
    updateCounters();
  }

  function clearExplicitBelow(folderId) {
    // Walk the loaded subtree; anything with folderId as an ancestor is cleared.
    var ids = state.childrenById[folderId];
    if (!ids) return;
    for (var i = 0; i < ids.length; i++) {
      delete state.explicit[ids[i]];
      delete state.recursive[ids[i]];
      var child = state.nodes[ids[i]];
      if (child && child.isFolder) clearExplicitBelow(ids[i]);
    }
  }

  function refreshAllVisibleState() {
    var lis = els.tree.querySelectorAll('li[data-id]');
    for (var i = 0; i < lis.length; i++) {
      var li = lis[i];
      var id = li.dataset.id;
      var n = state.nodes[id];
      if (!n) continue;
      var row = li.querySelector(':scope > .pt-node');
      var box = row ? row.querySelector('input[type="checkbox"]') : null;
      if (!row || !box) continue;

      var locked = isLocked(id);
      var checked = isEffectivelyChecked(id);

      box.checked = checked;
      box.disabled = locked;

      row.classList.toggle('pt-node--skip',   !n.transferable);
      row.classList.toggle('pt-node--locked', locked && n.transferable);
    }
  }

  // ---- Batch actions ------------------------------------------------------
  function onSelectAllInView() {
    // Every unlocked transferable box currently in the DOM becomes checked.
    // Folders → recursive. Files → explicit.
    var lis = els.tree.querySelectorAll('li[data-id]');
    for (var i = 0; i < lis.length; i++) {
      var id = lis[i].dataset.id;
      var n = state.nodes[id];
      if (!n || !n.transferable) continue;
      if (hasRecursiveAncestor(id)) continue;
      if (n.isFolder) state.recursive[id] = true;
      else            state.explicit[id]  = true;
    }
    refreshAllVisibleState();
    updateCounters();
  }

  function onClearAll() {
    state.recursive = Object.create(null);
    state.explicit  = Object.create(null);
    refreshAllVisibleState();
    updateCounters();
  }

  // ---- Counters -----------------------------------------------------------
  function updateCounters() {
    var recCount = Object.keys(state.recursive).length;
    var expCount = Object.keys(state.explicit).length;
    var hasSelection = recCount > 0 || expCount > 0;
    var text;
    if (!hasSelection) {
      text = 'Nothing selected.';
    } else {
      text = recCount + ' folder' + (recCount === 1 ? '' : 's') + ' recursive · ' +
             expCount + ' individual item' + (expCount === 1 ? '' : 's');
    }
    els.counters.textContent = text;
    els.previewBtn.disabled = !hasSelection;
    // Any selection change invalidates a prior preview — the plan it showed
    // is no longer the plan the server would compute now.
    hidePreview();
    updateSelectAllToggleState();
  }

  function updateSelectAllToggleState() {
    if (!els.selectAllToggle) return;
    var lis = els.tree.querySelectorAll('li[data-id]');
    var totalSelectable = 0;
    var selectedCount = 0;
    for (var i = 0; i < lis.length; i++) {
      var id = lis[i].dataset.id;
      var n = state.nodes[id];
      if (!n || !n.transferable) continue;
      if (hasRecursiveAncestor(id)) continue;
      totalSelectable++;
      if (isEffectivelyChecked(id)) {
        selectedCount++;
      }
    }
    if (totalSelectable === 0) {
      els.selectAllToggle.checked = false;
      els.selectAllToggle.indeterminate = false;
      els.selectAllToggle.disabled = true;
    } else if (selectedCount === 0) {
      els.selectAllToggle.checked = false;
      els.selectAllToggle.indeterminate = false;
      els.selectAllToggle.disabled = false;
    } else if (selectedCount === totalSelectable) {
      els.selectAllToggle.checked = true;
      els.selectAllToggle.indeterminate = false;
      els.selectAllToggle.disabled = false;
    } else {
      els.selectAllToggle.checked = false;
      els.selectAllToggle.indeterminate = true;
      els.selectAllToggle.disabled = false;
    }
  }

  // ---- Preview (dry run) --------------------------------------------------
  function onPreview() {
    var recursiveIds = Object.keys(state.recursive);
    var explicitIds  = Object.keys(state.explicit);
    if (recursiveIds.length === 0 && explicitIds.length === 0) {
      setStatus('Select at least one folder or file first.', 'error');
      return;
    }
    els.previewBtn.disabled = true;
    els.commitBtn.disabled = true;
    
    setStatus('');
    
    els.previewContainer.hidden = false;
    els.previewContainer.innerHTML =
      '<div class="pt-preview-inline__loading">' +
        '<span class="pt-preview-inline__spinner"></span>' +
        '<span>Summarizing ownership transfer...</span>' +
      '</div>';
      
    google.script.run
      .withSuccessHandler(function (preview) {
        renderPreview(preview);
        els.previewBtn.disabled = false;
        els.commitBtn.disabled = false;
        var tail;
        if (preview.emailedTo) {
          tail = ' Report emailed to ' + preview.emailedTo + '.';
        } else if (preview.emailError) {
          tail = ' (Email failed: ' + preview.emailError + '.)';
        } else {
          tail = '';
        }
        setStatus('Preview ready. Nothing has been modified.' + tail, 'ok');
      })
      .withFailureHandler(function (err) {
        els.previewBtn.disabled = false;
        els.commitBtn.disabled = false;
        hidePreview();
        setStatus('Preview failed: ' + errMsg(err), 'error');
        showAlertDialog('Preview failed', errMsg(err));
      })
      .previewTransfer({
        targetFolderId: (els.targetFolderId.value || '').trim(),
        selection: { recursiveIds: recursiveIds, explicitIds: explicitIds }
      });
  }

  function renderPreview(preview) {
    var s = preview.summary || {};
    var overCap = s.overCap;
    
    var html = '';
    
    if (overCap) {
      html +=
        '<div class="pt-status pt-status--error" style="margin-bottom:var(--space-3);">' +
          'This plan (~' + Math.round((s.stateBytes || 0) / 1024) + ' KB) is over the ' +
          Math.round((s.capBytes || 0) / 1024) + ' KB ScriptProperties ceiling. Commit would fail — narrow the selection.' +
        '</div>';
    }
    
    html +=
      '<div class="pt-preview-inline__summary">' +
        '<strong>Preview Summary:</strong><br>' +
        'Will transfer: <strong>' + s.willTransfer + '</strong> (' + s.folders + ' folder' + (s.folders === 1 ? '' : 's') + ', ' + s.files + ' file' + (s.files === 1 ? '' : 's') + ') · ' +
        'Will skip: <strong>' + s.willSkip + '</strong> · ' +
        'State size: <strong>' + Math.round((s.stateBytes || 0) / 1024) + ' KB</strong>' +
      '</div>';
      
    if (preview.plan && preview.plan.length > 0) {
      html +=
        '<details class="pt-preview-inline__details">' +
          '<summary>Items that will transfer (' + preview.plan.length + (preview.planTruncated ? '+' : '') + ')</summary>' +
          '<ul class="pt-preview-inline__list pt-preview-plan-list"></ul>' +
        '</details>';
    }
    
    if (preview.skip && preview.skip.length > 0) {
      html +=
        '<details class="pt-preview-inline__details">' +
          '<summary>Items that will be skipped (' + preview.skip.length + (preview.skipTruncated ? '+' : '') + ')</summary>' +
          '<ul class="pt-preview-inline__list pt-preview-skip-list"></ul>' +
        '</details>';
    }
    
    html += '<button class="pt-btn pt-btn--outline pt-btn--small" id="dismissPreviewBtn" type="button" style="margin-top:var(--space-3);">Dismiss Preview</button>';
    
    els.previewContainer.innerHTML = html;
    
    var planList = els.previewContainer.querySelector('.pt-preview-plan-list');
    if (planList) {
      renderInlineList(planList, preview.plan, preview.planTruncated, preview.previewCap, false);
    }
    var skipList = els.previewContainer.querySelector('.pt-preview-skip-list');
    if (skipList) {
      renderInlineList(skipList, preview.skip, preview.skipTruncated, preview.previewCap, true);
    }
    
    var dismissBtn = els.previewContainer.querySelector('#dismissPreviewBtn');
    if (dismissBtn) {
      dismissBtn.addEventListener('click', hidePreview);
    }
  }

  function renderInlineList(ul, items, truncated, cap, showOwner) {
    ul.innerHTML = '';
    if (!items || items.length === 0) {
      var empty = document.createElement('li');
      empty.className = 'pt-preview-inline__list-empty';
      empty.textContent = 'None.';
      ul.appendChild(empty);
      return;
    }
    for (var i = 0; i < items.length; i++) {
      var it = items[i];
      var li = document.createElement('li');
      var icon = it.isFolder ? '📁 ' : '📄 ';
      var main = document.createElement('span');
      main.textContent = icon + (it.path || it.name || it.id);
      li.appendChild(main);
      if (showOwner && it.message) {
        var owner = document.createElement('span');
        owner.style.color = 'var(--color-neutral-60)';
        owner.style.fontStyle = 'italic';
        owner.textContent = ' — ' + it.message;
        li.appendChild(owner);
      }
      ul.appendChild(li);
    }
    if (truncated) {
      var more = document.createElement('li');
      more.className = 'pt-preview-inline__list-more';
      more.textContent = 'Truncated at ' + cap + '. Real run will still process every item.';
      ul.appendChild(more);
    }
  }

  function hidePreview() {
    els.previewContainer.hidden = true;
    els.previewContainer.innerHTML = '';
  }

  // ---- Commit -------------------------------------------------------------
  function onCommit() {
    var newOwner = (els.newOwnerEmail.value || '').trim();
    if (!newOwner) { setStatus('Enter a new owner email.', 'error'); return; }
    if (!/@princeton\.edu$/i.test(newOwner)) {
      setStatus('New owner email must end in princeton.edu.', 'error');
      return;
    }
    var recursiveIds = Object.keys(state.recursive);
    var explicitIds  = Object.keys(state.explicit);
    if (recursiveIds.length === 0 && explicitIds.length === 0) {
      setStatus('Nothing selected — nothing to do.', 'error');
      return;
    }
    showConfirmDialog({
      title: 'Start transfer?',
      bodyHtml:
        '<p><strong>New owner:</strong> ' + escapeHtmlText(newOwner) + '</p>' +
        '<p><strong>Recursive folders:</strong> ' + recursiveIds.length + '</p>' +
        '<p><strong>Individual items:</strong> ' + explicitIds.length + '</p>' +
        '<p>Selected folders will transfer with everything inside them. Non-owned items will be skipped automatically.</p>' +
        '<p>Top-level selected items will move to ' + escapeHtmlText(newOwner) + '\'s My Drive root, so they may disappear from your folder tree even though you keep editor access.</p>',
      confirmLabel: 'Start transfer'
    }, function (confirmed) {
      if (!confirmed) return;
      beginCommit(newOwner, recursiveIds, explicitIds);
    });
  }

  function beginCommit(newOwner, recursiveIds, explicitIds) {
    els.loadBtn.disabled = true;
    els.loadMyDriveBtn.disabled = true;
    els.commitBtn.disabled = true;
    setStatus('<span class="pt-preview-inline__spinner" style="vertical-align:middle; margin-right:8px; width:14px; height:14px;"></span>Please wait for the transfer to show as in-progress.  Gathering all file information now.');
    // Start polling and refreshing the queue shortly after initiation so the user sees the new job asap
    setTimeout(function () {
      fetchQueue(false);
      scheduleQueuePoll();
    }, 500);
    setTimeout(function () {
      fetchQueue(false);
    }, 2500);
    google.script.run
      .withSuccessHandler(onCommitSuccess)
      .withFailureHandler(onCommitFailure)
      .commitTransfer({
        targetFolderId: (els.targetFolderId.value || '').trim(),
        newOwnerEmail:  newOwner,
        selection: {
          recursiveIds: recursiveIds,
          explicitIds:  explicitIds
        }
      });
  }

  function onCommitSuccess(result) {
    els.loadBtn.disabled = false;
    els.loadMyDriveBtn.disabled = false;
    els.commitBtn.disabled = false;
    if (result && result.queued) {
      setStatus(
        'Queued behind ' + (result.ahead || 0) + ' other job(s). It will start as soon as the current one finishes; ' +
        'you will get an email when yours completes. Watch In-progress Transfers for progress.', 'ok'
      );
    } else if (result && result.done) {
      // Job ran to completion inside commitTransfer — no need to wait or
      // watch the queue. Email reports were sent to the initiator and the
      // new owner.
      setStatus(
        'Transfer complete. All items processed inside this call — no queue entry needed. ' +
        'Check your inbox for the completion report and (if you were the new owner) the summary.',
        'ok'
      );
    } else {
      setStatus(
        'Lastest transfer is still in progress.  You will receive a summary email when complete.',
        'ok'
      );
    }
    fetchQueue(false);
  }
  function onCommitFailure(err) {
    els.loadBtn.disabled = false;
    els.loadMyDriveBtn.disabled = false;
    els.commitBtn.disabled = false;
    setStatus('Commit failed: ' + errMsg(err), 'error');
    showAlertDialog('Transfer could not start', errMsg(err));
  }

  function errMsg(err) {
    if (!err) return 'unknown error';
    if (err.message) return err.message;
    return String(err);
  }
})();
</script>
