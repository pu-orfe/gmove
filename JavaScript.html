<script>
(function () {
  'use strict';

  var els = {
    targetFolderId:  document.getElementById('targetFolderId'),
    newOwnerEmail:   document.getElementById('newOwnerEmail'),
    loadBtn:         document.getElementById('loadBtn'),
    loadMyDriveBtn:  document.getElementById('loadMyDriveBtn'),
    previewBtn:      document.getElementById('previewBtn'),
    commitBtn:       document.getElementById('commitBtn'),
    status:          document.getElementById('status'),
    treeCard:        document.getElementById('tree-card'),
    tree:            document.getElementById('tree'),
    counters:        document.getElementById('counters'),
    expandAllBtn:    document.getElementById('expandAllBtn'),
    collapseAllBtn:  document.getElementById('collapseAllBtn'),
    selectAllBtn:    document.getElementById('selectAllBtn'),
    clearAllBtn:     document.getElementById('clearAllBtn'),
    previewCard:     document.getElementById('preview-card'),
    previewSummary:  document.getElementById('preview-summary'),
    previewPlanList: document.getElementById('preview-plan-list'),
    previewSkipList: document.getElementById('preview-skip-list'),
    previewPlanDetails: document.getElementById('preview-plan-details'),
    previewSkipDetails: document.getElementById('preview-skip-details'),
    closePreviewBtn: document.getElementById('closePreviewBtn')
  };

  // -------------------------------------------------------------------------
  // State
  //
  // nodes:     id → node metadata (id, name, isFolder, owner, transferable,
  //                                parentId, childrenLoaded, expanded)
  // childrenById: id → array of child ids in render order
  // recursive: set of folder ids the user chose "transfer everything inside"
  // explicit:  set of individually-selected item ids (not covered by a recursive ancestor)
  //
  // Effective checked = id ∈ recursive || id ∈ explicit || any ancestor in recursive.
  // Locked            = !transferable  || any ancestor in recursive.
  //
  // The server sees only `recursive` and `explicit`. It walks each recursive
  // subtree with DriveApp and produces the actual plan — the client never
  // needs to have expanded a folder for it to be transferred.
  // -------------------------------------------------------------------------
  var state = {
    activeUserEmail: '',
    rootId: null,
    nodes: Object.create(null),
    childrenById: Object.create(null),
    recursive: Object.create(null),
    explicit:  Object.create(null)
  };

  els.loadBtn.addEventListener('click', onLoad);
  els.loadMyDriveBtn.addEventListener('click', onLoadMyDrive);
  els.previewBtn.addEventListener('click', onPreview);
  els.commitBtn.addEventListener('click', onCommit);
  els.expandAllBtn.addEventListener('click', onExpandAllInView);
  els.collapseAllBtn.addEventListener('click', onCollapseAll);
  els.selectAllBtn.addEventListener('click', onSelectAllInView);
  els.clearAllBtn.addEventListener('click', onClearAll);
  els.closePreviewBtn.addEventListener('click', hidePreview);

  // ---- Status helpers -----------------------------------------------------
  function setStatus(msg, kind) {
    els.status.textContent = msg || '';
    els.status.className = 'pt-status' + (kind ? ' pt-status--' + kind : '');
  }

  // ---- Root load ----------------------------------------------------------
  function onLoad() {
    var id = (els.targetFolderId.value || '').trim();
    if (!id) { setStatus('Enter a target folder ID first.', 'error'); return; }
    loadRoot(id);
  }

  function onLoadMyDrive() {
    els.loadMyDriveBtn.disabled = true;
    setStatus('Fetching My Drive root…');
    google.script.run
      .withSuccessHandler(function (root) {
        // Populate the input so the user learns what the root ID looks like
        // and can copy it if they want to bookmark or share it.
        els.targetFolderId.value = root.id;
        els.loadMyDriveBtn.disabled = false;
        loadRoot(root.id);
      })
      .withFailureHandler(function (err) {
        els.loadMyDriveBtn.disabled = false;
        setStatus('Could not open My Drive: ' + errMsg(err), 'error');
      })
      .getMyDriveRoot();
  }

  function loadRoot(id) {
    els.loadBtn.disabled = true;
    els.loadMyDriveBtn.disabled = true;
    setStatus('Loading folder…');
    google.script.run
      .withSuccessHandler(function (result) {
        onBrowseSuccess(result, /*isRoot*/true);
        els.loadBtn.disabled = false;
        els.loadMyDriveBtn.disabled = false;
        els.commitBtn.disabled = false;
        setStatus('Loaded ' + result.node.name + '. Click ▸ to expand a folder. Active user: ' + result.activeUserEmail, 'ok');
      })
      .withFailureHandler(function (err) {
        els.loadBtn.disabled = false;
        els.loadMyDriveBtn.disabled = false;
        setStatus('Load failed: ' + errMsg(err), 'error');
      })
      .browseFolder(id);
  }

  function onBrowseSuccess(result, isRoot) {
    state.activeUserEmail = result.activeUserEmail;
    var node = result.node;
    if (isRoot) {
      state.rootId = node.id;
      state.nodes = Object.create(null);
      state.childrenById = Object.create(null);
      state.recursive = Object.create(null);
      state.explicit = Object.create(null);
      els.tree.innerHTML = '';
    }
    registerNode(node, null);
    var childIds = [];
    for (var i = 0; i < result.children.length; i++) {
      var c = result.children[i];
      registerNode(c, node.id);
      childIds.push(c.id);
    }
    state.childrenById[node.id] = childIds;
    state.nodes[node.id].childrenLoaded = true;
    state.nodes[node.id].truncated = !!result.truncated;
    state.nodes[node.id].expanded = true;

    if (isRoot) {
      var ul = document.createElement('ul');
      ul.appendChild(buildLi(node.id));
      els.tree.appendChild(ul);
      els.treeCard.hidden = false;
    } else {
      // Insert children under the existing li for `node`.
      var li = liById(node.id);
      if (!li) return;
      var childUl = li.querySelector(':scope > ul');
      if (!childUl) {
        childUl = document.createElement('ul');
        li.appendChild(childUl);
      }
      childUl.innerHTML = '';
      for (var j = 0; j < childIds.length; j++) {
        childUl.appendChild(buildLi(childIds[j]));
      }
      if (result.truncated) {
        var warn = document.createElement('li');
        warn.className = 'pt-node pt-node--skip';
        warn.innerHTML = '<span class="pt-badge">Truncated at ' + result.cap +
          ' children — narrower selection recommended for this folder.</span>';
        childUl.appendChild(warn);
      }
      updateToggleGlyph(li);
    }
    refreshAllVisibleState();
    updateCounters();
  }

  function registerNode(n, parentId) {
    if (!state.nodes[n.id]) state.nodes[n.id] = { id: n.id };
    var slot = state.nodes[n.id];
    slot.id = n.id;
    slot.name = n.name;
    slot.isFolder = !!n.isFolder;
    slot.owner = n.owner || '';
    slot.transferable = !!n.transferable;
    slot.parentId = parentId != null ? parentId : slot.parentId || null;
    slot.mimeType = n.mimeType || '';
    if (slot.childrenLoaded === undefined) slot.childrenLoaded = false;
    if (slot.expanded === undefined) slot.expanded = false;
  }

  // ---- DOM builders -------------------------------------------------------
  function buildLi(nodeId) {
    var n = state.nodes[nodeId];
    var li = document.createElement('li');
    li.dataset.id = nodeId;

    var row = document.createElement('div');
    row.className = 'pt-node';
    row.dataset.id = nodeId;

    var toggle = document.createElement('span');
    toggle.className = 'pt-node__toggle' + (n.isFolder ? '' : ' pt-node__toggle--leaf');
    toggle.textContent = n.isFolder ? '▸' : '';
    if (n.isFolder) {
      toggle.addEventListener('click', function () { onToggleFolder(nodeId); });
    }

    var checkbox = document.createElement('input');
    checkbox.type = 'checkbox';
    checkbox.dataset.id = nodeId;
    checkbox.addEventListener('change', function () { onCheckboxChange(nodeId, checkbox.checked); });

    var icon = document.createElement('span');
    icon.className = 'pt-node__icon';
    icon.textContent = n.isFolder ? '📁' : '📄';

    var label = document.createElement('span');
    label.className = 'pt-node__label' + (n.isFolder ? ' pt-node__label--folder' : '');
    label.textContent = n.name;

    var idSpan = document.createElement('span');
    idSpan.className = 'pt-node__id';
    idSpan.textContent = (n.id || '').slice(0, 10) + '…';
    idSpan.title = n.id;

    row.appendChild(toggle);
    row.appendChild(checkbox);
    row.appendChild(icon);
    row.appendChild(label);
    row.appendChild(idSpan);

    if (!n.transferable) {
      var badge = document.createElement('span');
      badge.className = 'pt-badge';
      badge.textContent = n.owner
        ? 'Owned by ' + n.owner + ' — will skip'
        : 'No single owner (shared drive?) — will skip';
      row.appendChild(badge);
    }
    li.appendChild(row);

    // Children container (populated when the folder is expanded).
    if (n.isFolder && state.childrenById[nodeId]) {
      var ul = document.createElement('ul');
      var ids = state.childrenById[nodeId];
      for (var i = 0; i < ids.length; i++) ul.appendChild(buildLi(ids[i]));
      li.appendChild(ul);
      if (!n.expanded) ul.style.display = 'none';
    }
    return li;
  }

  function liById(id) {
    return els.tree.querySelector('li[data-id="' + cssEsc(id) + '"]');
  }
  function cssEsc(s) {
    // For our purposes drive ids are alnum + - + _; safe enough to inject.
    return String(s).replace(/[^a-zA-Z0-9_\-]/g, '');
  }

  function updateToggleGlyph(li) {
    var n = state.nodes[li.dataset.id];
    var toggle = li.querySelector(':scope > .pt-node > .pt-node__toggle');
    var ul = li.querySelector(':scope > ul');
    if (!toggle) return;
    if (!n.isFolder) { toggle.textContent = ''; return; }
    if (!n.childrenLoaded) { toggle.textContent = '▸'; return; }
    var open = ul && ul.style.display !== 'none';
    toggle.textContent = open ? '▾' : '▸';
  }

  // ---- Expand / collapse --------------------------------------------------
  function onToggleFolder(id) {
    var n = state.nodes[id];
    if (!n || !n.isFolder) return;
    if (n.loading) return; // ignore rapid re-clicks while a fetch is in flight
    if (!n.childrenLoaded) {
      setToggleLoading(id, true);
      setStatus('Loading ' + n.name + '…');
      google.script.run
        .withSuccessHandler(function (result) {
          setToggleLoading(id, false);
          onBrowseSuccess(result, /*isRoot*/false);
          setStatus('', 'ok');
        })
        .withFailureHandler(function (err) {
          setToggleLoading(id, false);
          setStatus('Cannot list ' + n.name + ': ' + errMsg(err), 'error');
        })
        .browseFolder(id);
      return;
    }
    // Toggle visible state
    var li = liById(id);
    if (!li) return;
    var ul = li.querySelector(':scope > ul');
    if (!ul) return;
    n.expanded = ul.style.display === 'none';
    ul.style.display = n.expanded ? '' : 'none';
    updateToggleGlyph(li);
  }

  function setToggleLoading(id, isLoading) {
    var n = state.nodes[id];
    if (!n) return;
    n.loading = !!isLoading;
    var li = liById(id);
    if (!li) return;
    var toggle = li.querySelector(':scope > .pt-node > .pt-node__toggle');
    if (!toggle) return;
    if (isLoading) {
      toggle.classList.add('pt-node__toggle--loading');
      toggle.textContent = '';
      toggle.setAttribute('aria-label', 'Loading contents');
    } else {
      toggle.classList.remove('pt-node__toggle--loading');
      toggle.removeAttribute('aria-label');
      updateToggleGlyph(li);
    }
  }

  function onExpandAllInView() {
    // Only expand folders whose children are already loaded — do not auto-fetch.
    var lis = els.tree.querySelectorAll('li');
    for (var i = 0; i < lis.length; i++) {
      var id = lis[i].dataset.id;
      var n = state.nodes[id];
      if (!n || !n.isFolder || !n.childrenLoaded) continue;
      var ul = lis[i].querySelector(':scope > ul');
      if (!ul) continue;
      ul.style.display = '';
      n.expanded = true;
      updateToggleGlyph(lis[i]);
    }
  }

  function onCollapseAll() {
    var lis = els.tree.querySelectorAll('li');
    for (var i = 0; i < lis.length; i++) {
      var id = lis[i].dataset.id;
      var n = state.nodes[id];
      if (!n || !n.isFolder) continue;
      var ul = lis[i].querySelector(':scope > ul');
      if (!ul) continue;
      // Keep the root open — collapsing it hides everything.
      if (id === state.rootId) continue;
      ul.style.display = 'none';
      n.expanded = false;
      updateToggleGlyph(lis[i]);
    }
  }

  // ---- Ancestor / lock helpers -------------------------------------------
  function hasRecursiveAncestor(id) {
    var cur = state.nodes[id];
    while (cur && cur.parentId != null) {
      if (state.recursive[cur.parentId]) return true;
      cur = state.nodes[cur.parentId];
    }
    return false;
  }

  function isEffectivelyChecked(id) {
    if (state.recursive[id]) return true;
    if (state.explicit[id])  return true;
    return hasRecursiveAncestor(id);
  }

  function isLocked(id) {
    var n = state.nodes[id];
    if (!n || !n.transferable) return true;
    return hasRecursiveAncestor(id);
  }

  // ---- Checkbox interaction ----------------------------------------------
  function onCheckboxChange(id, checkedNow) {
    var n = state.nodes[id];
    if (!n || !n.transferable) return;
    if (hasRecursiveAncestor(id)) {
      // Locked — should not be reachable because the input is disabled, but
      // if it somehow was, restore the checkbox state and bail.
      refreshAllVisibleState();
      return;
    }
    if (checkedNow) {
      if (n.isFolder) {
        state.recursive[id] = true;
        // Any explicit descendant selections are now redundant — clear them.
        // (Not strictly required for correctness because the server-walk on
        // commit dedupes by id, but keeping client state clean is cheap.)
        clearExplicitBelow(id);
      } else {
        state.explicit[id] = true;
      }
    } else {
      delete state.recursive[id];
      delete state.explicit[id];
    }
    refreshAllVisibleState();
    updateCounters();
  }

  function clearExplicitBelow(folderId) {
    // Walk the loaded subtree; anything with folderId as an ancestor is cleared.
    var ids = state.childrenById[folderId];
    if (!ids) return;
    for (var i = 0; i < ids.length; i++) {
      delete state.explicit[ids[i]];
      delete state.recursive[ids[i]];
      var child = state.nodes[ids[i]];
      if (child && child.isFolder) clearExplicitBelow(ids[i]);
    }
  }

  function refreshAllVisibleState() {
    var lis = els.tree.querySelectorAll('li[data-id]');
    for (var i = 0; i < lis.length; i++) {
      var li = lis[i];
      var id = li.dataset.id;
      var n = state.nodes[id];
      if (!n) continue;
      var row = li.querySelector(':scope > .pt-node');
      var box = row ? row.querySelector('input[type="checkbox"]') : null;
      if (!row || !box) continue;

      var locked = isLocked(id);
      var checked = isEffectivelyChecked(id);

      box.checked = checked;
      box.disabled = locked;

      row.classList.toggle('pt-node--skip',   !n.transferable);
      row.classList.toggle('pt-node--locked', locked && n.transferable);
    }
  }

  // ---- Batch actions ------------------------------------------------------
  function onSelectAllInView() {
    // Every unlocked transferable box currently in the DOM becomes checked.
    // Folders → recursive. Files → explicit.
    var lis = els.tree.querySelectorAll('li[data-id]');
    for (var i = 0; i < lis.length; i++) {
      var id = lis[i].dataset.id;
      var n = state.nodes[id];
      if (!n || !n.transferable) continue;
      if (hasRecursiveAncestor(id)) continue;
      if (n.isFolder) state.recursive[id] = true;
      else            state.explicit[id]  = true;
    }
    refreshAllVisibleState();
    updateCounters();
  }

  function onClearAll() {
    state.recursive = Object.create(null);
    state.explicit  = Object.create(null);
    refreshAllVisibleState();
    updateCounters();
  }

  // ---- Counters -----------------------------------------------------------
  function updateCounters() {
    var recCount = Object.keys(state.recursive).length;
    var expCount = Object.keys(state.explicit).length;
    var hasSelection = recCount > 0 || expCount > 0;
    var text;
    if (!hasSelection) {
      text = 'Nothing selected.';
    } else {
      text = recCount + ' folder' + (recCount === 1 ? '' : 's') + ' recursive · ' +
             expCount + ' individual item' + (expCount === 1 ? '' : 's');
    }
    els.counters.textContent = text;
    els.previewBtn.disabled = !hasSelection;
    // Any selection change invalidates a prior preview — the plan it showed
    // is no longer the plan the server would compute now.
    hidePreview();
  }

  // ---- Preview (dry run) --------------------------------------------------
  function onPreview() {
    var recursiveIds = Object.keys(state.recursive);
    var explicitIds  = Object.keys(state.explicit);
    if (recursiveIds.length === 0 && explicitIds.length === 0) {
      setStatus('Select at least one folder or file first.', 'error');
      return;
    }
    els.previewBtn.disabled = true;
    els.commitBtn.disabled = true;
    setStatus('Walking selected subtrees…');
    google.script.run
      .withSuccessHandler(function (preview) {
        renderPreview(preview);
        els.previewBtn.disabled = false;
        els.commitBtn.disabled = false;
        var tail;
        if (preview.emailedTo) {
          tail = ' Report emailed to ' + preview.emailedTo + '.';
        } else if (preview.emailError) {
          tail = ' (Email failed: ' + preview.emailError + '.)';
        } else {
          tail = '';
        }
        setStatus('Preview ready. Nothing has been modified.' + tail + ' Review below, then click Confirm to run.', 'ok');
      })
      .withFailureHandler(function (err) {
        els.previewBtn.disabled = false;
        els.commitBtn.disabled = false;
        setStatus('Preview failed: ' + errMsg(err), 'error');
      })
      .previewTransfer({
        targetFolderId: (els.targetFolderId.value || '').trim(),
        selection: { recursiveIds: recursiveIds, explicitIds: explicitIds }
      });
  }

  function renderPreview(preview) {
    var s = preview.summary || {};
    var overCap = s.overCap;

    els.previewSummary.innerHTML = '';
    var metrics = [
      { label: 'Will transfer', value: s.willTransfer, kind: 'ok' },
      { label: 'Folders',       value: s.folders,      kind: 'muted' },
      { label: 'Files',         value: s.files,        kind: 'muted' },
      { label: 'Will skip',     value: s.willSkip,     kind: (s.willSkip > 0 ? 'warn' : 'muted') },
      { label: 'State size',    value: Math.round((s.stateBytes || 0) / 1024) + ' KB',
                                kind: (overCap ? 'bad' : 'muted') }
    ];
    for (var i = 0; i < metrics.length; i++) els.previewSummary.appendChild(metricEl(metrics[i]));

    if (overCap) {
      var warn = document.createElement('p');
      warn.className = 'pt-status pt-status--error';
      warn.textContent = 'This plan is over the ' + Math.round((s.capBytes || 0) / 1024) +
        ' KB ScriptProperties ceiling — commit would fail. Narrow the selection.';
      els.previewSummary.appendChild(warn);
    }

    renderList(els.previewPlanList, preview.plan, preview.planTruncated, preview.previewCap, false);
    renderList(els.previewSkipList, preview.skip, preview.skipTruncated, preview.previewCap, true);
    els.previewPlanDetails.open = preview.plan.length > 0 && preview.plan.length <= 25;
    els.previewSkipDetails.open = preview.skip.length > 0 && preview.skip.length <= 25;

    els.previewCard.hidden = false;
    els.previewCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function metricEl(m) {
    var d = document.createElement('div');
    d.className = 'pt-metric pt-metric--' + (m.kind || 'muted');
    d.innerHTML = '<div class="pt-metric__label"></div><div class="pt-metric__value"></div>';
    d.querySelector('.pt-metric__label').textContent = m.label;
    d.querySelector('.pt-metric__value').textContent = String(m.value);
    return d;
  }

  function renderList(ul, items, truncated, cap, showOwner) {
    ul.innerHTML = '';
    if (!items || items.length === 0) {
      var empty = document.createElement('li');
      empty.className = 'pt-preview-list__empty';
      empty.textContent = 'None.';
      ul.appendChild(empty);
      return;
    }
    for (var i = 0; i < items.length; i++) {
      var it = items[i];
      var li = document.createElement('li');
      var icon = it.isFolder ? '📁 ' : '📄 ';
      var main = document.createElement('span');
      main.className = 'pt-preview-list__path';
      main.textContent = icon + (it.path || it.name || it.id);
      li.appendChild(main);
      if (showOwner && it.message) {
        var owner = document.createElement('span');
        owner.className = 'pt-preview-list__owner';
        owner.textContent = ' — ' + it.message;
        li.appendChild(owner);
      }
      ul.appendChild(li);
    }
    if (truncated) {
      var more = document.createElement('li');
      more.className = 'pt-preview-list__more';
      more.textContent = 'Truncated at ' + cap + '. Real run will still process every item.';
      ul.appendChild(more);
    }
  }

  function hidePreview() {
    els.previewCard.hidden = true;
  }

  // ---- Commit -------------------------------------------------------------
  function onCommit() {
    var newOwner = (els.newOwnerEmail.value || '').trim();
    if (!newOwner) { setStatus('Enter a new owner email.', 'error'); return; }
    var recursiveIds = Object.keys(state.recursive);
    var explicitIds  = Object.keys(state.explicit);
    if (recursiveIds.length === 0 && explicitIds.length === 0) {
      setStatus('Nothing selected — nothing to do.', 'error');
      return;
    }
    var msg = 'Transfer ownership to ' + newOwner + '?\n\n' +
      recursiveIds.length + ' folder(s) will be transferred *with everything inside*.\n' +
      explicitIds.length  + ' individual item(s) will be transferred.\n\n' +
      'Non-owned items in the walk will be skipped automatically.';
    if (!confirm(msg)) return;
    els.loadBtn.disabled = true;
    els.commitBtn.disabled = true;
    setStatus('Committing… large jobs will resume via a time-driven trigger; you will receive an email report.');
    google.script.run
      .withSuccessHandler(onCommitSuccess)
      .withFailureHandler(onCommitFailure)
      .commitTransfer({
        targetFolderId: (els.targetFolderId.value || '').trim(),
        newOwnerEmail:  newOwner,
        selection: {
          recursiveIds: recursiveIds,
          explicitIds:  explicitIds
        }
      });
  }

  function onCommitSuccess(result) {
    els.loadBtn.disabled = false;
    els.commitBtn.disabled = false;
    if (result && result.done) {
      setStatus('Transfer complete. ' + result.processed + '/' + result.total + ' processed. Report emailed.', 'ok');
    } else {
      setStatus('Checkpoint saved. Processed ' + (result && result.processed) + '/' + (result && result.total) +
                '. Resume trigger scheduled — email will arrive on completion.', 'ok');
    }
  }
  function onCommitFailure(err) {
    els.loadBtn.disabled = false;
    els.commitBtn.disabled = false;
    setStatus('Commit failed: ' + errMsg(err), 'error');
  }

  function errMsg(err) {
    if (!err) return 'unknown error';
    if (err.message) return err.message;
    return String(err);
  }
})();
</script>
